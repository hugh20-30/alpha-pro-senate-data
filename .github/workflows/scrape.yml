name: Scrape Senate PTRs

on:
schedule:
- cron: '45 */6 * * *'
workflow_dispatch: {}

concurrency:
group: scrape
cancel-in-progress: false

jobs:
scrape:
runs-on: ubuntu-latest
timeout-minutes: 25
permissions:
contents: write
steps:
- name: Checkout
uses: actions/checkout@v4
with:
fetch-depth: 0


  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: '20'
      cache: 'npm'

  - name: Install dependencies
    run: npm install

  - name: Run scraper
    run: npm run scrape

  - name: Commit + push JSON if changed
    run: |
      git config user.name  "alpha-pro-scraper[bot]"
      git config user.email "alpha-pro-scraper[bot]@users.noreply.github.com"
      git add senate-trades.json
      if git diff --staged --quiet; then
        echo "No changes — skipping commit"
        exit 0
      fi
      git commit -m "Update senate-trades.json · $(date -u +'%Y-%m-%dT%H:%MZ') [skip ci]"
      for i in 1 2 3; do
        git pull --rebase origin main && git push && break
        echo "Push attempt $i failed, retrying in 5s..."
        sleep 5
      done
